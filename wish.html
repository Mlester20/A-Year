<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #4a3826;
            --ink-soft: #5c4632;
            --seal-red: #7a1f1f;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            padding: 50px 16px;
            min-height: 100vh;
            font-family: 'Lora', serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            background:
                radial-gradient(ellipse 60% 45% at 50% 38%, rgba(255, 196, 120, 0.16), transparent 70%),
                radial-gradient(ellipse 120% 80% at 50% 0%, #3a2a1c 0%, #241810 55%, #140d08 100%);
            background-color: #1b120c;
        }

        /* Faint wood-grain lines on the desk */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                100deg,
                rgba(0, 0, 0, 0) 0px,
                rgba(0, 0, 0, 0) 22px,
                rgba(0, 0, 0, 0.08) 23px,
                rgba(0, 0, 0, 0) 26px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Slow flickering candlelight glow */
        body::after {
            content: '';
            position: absolute;
            top: -10%;
            left: 50%;
            width: 70vw;
            height: 70vw;
            max-width: 900px;
            max-height: 900px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(255, 184, 92, 0.22) 0%, rgba(255, 140, 40, 0.08) 40%, transparent 70%);
            filter: blur(10px);
            pointer-events: none;
            z-index: 0;
            animation: candleFlicker 7s ease-in-out infinite;
        }

        @keyframes candleFlicker {
            0%, 100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
            45% { opacity: 1; transform: translateX(-50%) scale(1.04); }
            60% { opacity: 0.75; transform: translateX(-50%) scale(0.98); }
        }

        .letter-frame {
            max-width: 92%;
            width: 620px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            box-shadow:
                10px 18px 40px rgba(0, 0, 0, 0.55),
                -6px -2px 26px rgba(0, 0, 0, 0.22),
                0 0 90px rgba(0, 0, 0, 0.35);
            transform: rotate(-0.6deg);
            opacity: 0;
            animation:
                letterFadeIn 1.6s ease-out forwards,
                paperFloat 9s ease-in-out 1.6s infinite,
                shadowDrift 13s ease-in-out 1.6s infinite;
        }

        .letter-container {
            width: 100%;
            padding: 70px 56px 56px;
            position: relative;
            box-sizing: border-box;
            background-color: #e1cd9d;
            background-image:
                radial-gradient(ellipse at 15% 18%, rgba(120, 80, 40, 0.2), transparent 42%),
                radial-gradient(ellipse at 85% 12%, rgba(120, 80, 40, 0.16), transparent 38%),
                radial-gradient(ellipse at 78% 88%, rgba(120, 80, 40, 0.22), transparent 42%),
                radial-gradient(ellipse at 20% 92%, rgba(120, 80, 40, 0.16), transparent 38%),
                radial-gradient(ellipse at center, transparent 45%, rgba(58, 36, 16, 0.4) 100%),
                repeating-radial-gradient(circle at 50% 50%, rgba(110, 80, 45, 0.05) 0px, rgba(110, 80, 45, 0.05) 1px, transparent 1px, transparent 3px);
            clip-path: polygon(
                0% 1.5%, 4% 0.3%, 9% 1.6%, 14% 0.4%, 19% 1.8%, 24% 0.2%, 29% 1.4%, 34% 0.3%, 39% 1.7%, 44% 0.5%, 49% 1.2%, 54% 0.3%, 59% 1.6%, 64% 0.4%, 69% 1.5%, 74% 0.2%, 79% 1.8%, 84% 0.3%, 89% 1.3%, 94% 0.5%, 100% 1.6%,
                99.3% 6%, 100% 12%, 99% 18%, 100% 24%, 99.2% 30%, 100% 36%, 99% 42%, 100% 48%, 99.3% 54%, 100% 60%, 99% 66%, 100% 72%, 99.2% 78%, 100% 84%, 99% 90%, 100% 96%, 99.3% 99.5%,
                94% 98.5%, 89% 99.8%, 84% 98.4%, 79% 99.7%, 74% 98.3%, 69% 99.8%, 64% 98.5%, 59% 99.7%, 54% 98.4%, 49% 99.8%, 44% 98.3%, 39% 99.7%, 34% 98.5%, 29% 99.8%, 24% 98.4%, 19% 99.7%, 14% 98.3%, 9% 99.8%, 4% 98.5%, 0% 99.5%,
                0.8% 94%, 0% 88%, 0.7% 82%, 0% 76%, 0.6% 70%, 0% 64%, 0.8% 58%, 0% 52%, 0.6% 46%, 0% 40%, 0.7% 34%, 0% 28%, 0.6% 22%, 0% 16%, 0.8% 10%, 0% 4%
            );
        }

        @keyframes letterFadeIn {
            from { opacity: 0; transform: rotate(-0.6deg) translateY(26px); }
            to { opacity: 1; transform: rotate(-0.6deg) translateY(0); }
        }

        @keyframes paperFloat {
            0%, 100% { transform: rotate(-0.6deg) translateY(0); }
            50% { transform: rotate(-0.3deg) translateY(-6px); }
        }

        @keyframes shadowDrift {
            0%, 100% {
                box-shadow:
                    10px 18px 40px rgba(0, 0, 0, 0.55),
                    -6px -2px 26px rgba(0, 0, 0, 0.22),
                    0 0 90px rgba(0, 0, 0, 0.35);
            }
            50% {
                box-shadow:
                    6px 24px 46px rgba(0, 0, 0, 0.5),
                    -8px -4px 30px rgba(0, 0, 0, 0.2),
                    0 0 100px rgba(0, 0, 0, 0.3);
            }
        }

        /* Fold creases */
        .letter-container .fold-line {
            position: absolute;
            left: 4%;
            right: 4%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(60, 38, 16, 0.28) 20%, rgba(60, 38, 16, 0.28) 80%, transparent);
            box-shadow: 0 1px 1px rgba(255, 250, 235, 0.25);
            pointer-events: none;
        }

        .fold-line.top { top: 33%; }
        .fold-line.bottom { top: 66%; }

        /* Wax seal */
        .wax-seal {
            position: absolute;
            top: -22px;
            right: 38px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #9a2f2f, var(--seal-red) 55%, #4a0e0e 100%);
            box-shadow:
                0 3px 6px rgba(0, 0, 0, 0.5),
                inset 0 2px 3px rgba(255, 200, 180, 0.35),
                inset 0 -3px 6px rgba(0, 0, 0, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-8deg);
            z-index: 2;
        }

        .wax-seal span {
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            color: rgba(255, 230, 210, 0.85);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
        }

        /* Ink stain */
        .ink-stain {
            position: absolute;
            bottom: 8%;
            left: 6%;
            width: 70px;
            height: 50px;
            background: radial-gradient(ellipse at center, rgba(58, 36, 16, 0.16), transparent 70%);
            filter: blur(1px);
            pointer-events: none;
        }

        /* Feather pen silhouette */
        .feather {
            position: absolute;
            opacity: 0.45;
            color: var(--ink-soft);
        }

        .feather.bottom-right {
            width: 34px;
            height: 34px;
            bottom: 14px;
            right: 18px;
            transform: rotate(18deg);
        }

        .letter-content {
            position: relative;
            z-index: 1;
        }

        .dear {
            font-family: 'Dancing Script', cursive;
            font-size: 34px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 24px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .message {
            font-size: 17px;
            color: var(--ink);
            text-align: left;
            margin: 30px 0;
            line-height: 2;
            letter-spacing: 0.2px;
            white-space: pre-wrap;
        }

        .signature {
            text-align: right;
            margin-top: 44px;
            font-family: 'Dancing Script', cursive;
            color: var(--ink);
            position: relative;
        }

        .signature .love {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .signature .name {
            font-size: 30px;
            font-weight: 700;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 30px 12px;
            }

            .letter-container {
                padding: 56px 26px 36px;
            }

            .dear {
                font-size: 27px;
            }

            .message {
                font-size: 15.5px;
            }

            .signature {
                margin-top: 30px;
            }

            .signature .love {
                font-size: 19px;
            }

            .signature .name {
                font-size: 24px;
            }

            .wax-seal {
                width: 46px;
                height: 46px;
                top: -18px;
                right: 22px;
            }

            .wax-seal span {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="letter-frame">
        <div class="wax-seal"><span>M</span></div>
        <div class="letter-container">
            <div class="fold-line top"></div>
            <div class="fold-line bottom"></div>
            <div class="ink-stain"></div>
            <svg class="feather bottom-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <path d="M20 4c-6 0-13 4-16 13 2-1 4-2 5-4 0 2-1 4-3 6 5 0 11-4 14-11 .6-1.6.6-3 0-4z"/>
                <path d="M4 20s4-4 7-9"/>
            </svg>
            <div class="letter-content">
                <div class="dear">Dear Alyy</div>
                <div class="message" id="letterMessage"></div>
                <div class="signature">
                    <div class="love">Sincerely Yours,</div>
                    <div class="name">Mark Lester Raguindin</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="bgMusic" autoplay loop>
        <source src="love-song.mp3" type="audio/mpeg">
    </audio>

    <script>
        var letter = [`

It’s been a while since we met. and yet it still feels like yesterday when we first talked on that day.
Who would've thought that a follow suggestions would lead me to someone who'd feel like home?

Since day one, there was something in you—something quiet, but strong—that told me "you’re the one I was meant to find". And now, after all the days, calls, and even our hard times, I’m still here. "Because it’s still you. It’s always you."

Thank you for staying.
Thank you for being my safe place.
And thank you for loving me—even on days I don’t feel like I deserve it.

Happy End of June wifey.
Here’s to more months, more growth, more memories—and a love that stays, even when it’s not always easy.

There were times we almost gave up—when distance, miscommunication, or the weight of life tried to pull us apart. But we held on. Maybe that’s what love really is—not the perfect fairytale, but the real effort" to understand, forgive, and still choose each other day after day.

You’ve seen me at my best, and even more so at my worst. And yet, you chose to stay. That means everything to me.

I love how we can be goofy together one moment, then deep and vulnerable the next.
I love how you get me in ways others don’t.
And I love how just hearing your voice or seeing your name pop up in a notification can instantly make my day better.

You make love feel safe.
You make forever feel possible.

As the month of June end, I just want you to know:
No matter how far we are, no matter how busy life gets, I will always make space for you—because you’ve made a home in my heart.

Here's to us—our story, our slow mornings, our late-night calls, our inside jokes, and everything still waiting for us in the future.

I love you. Always.



        `]
        // Function to display message
        function displayRandomMessage() {
            const messageElement = document.getElementById('letterMessage');
            const randomIndex = Math.floor(Math.random() * letter.length);
            messageElement.textContent = letter[randomIndex];
        }

        // Display a message when the page loads
        window.onload = displayRandomMessage;

        // Some browsers block unmuted autoplay until a user gesture occurs
        document.addEventListener('click', function resumeMusic() {
            const audio = document.getElementById('bgMusic');
            if (audio && audio.paused) {
                audio.play().catch(function () {});
            }
            document.removeEventListener('click', resumeMusic);
        });
    </script>
</body>
</html>
